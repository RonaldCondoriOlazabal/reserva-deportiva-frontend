name: reservas-dev

services:
  mysql-reservas-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_reservas
    ports:
      - "3404:3306"
    volumes:
      - mysql_reservas_dev_data:/var/lib/mysql

volumes:
  mysql_reservas_dev_data:


name: pago-dev

services:
  postgres-pago-dev:
    image: postgres:16-alpine
    container_name: reservas-postgres-pago-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_pago
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas
    ports:
      - "5435:5432"
    volumes:
      - postgres_pago_dev_data:/var/lib/postgresql/data

volumes:
  postgres_pago_dev_data:

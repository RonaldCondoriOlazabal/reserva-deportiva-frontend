name: observability-prod

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: observability-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: observability-loki
    ports:
      - "13100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/config.yml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: observability-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ../auth/logs:/var/log/microservices/auth:ro
      - ../canchas/logs:/var/log/microservices/canchas:ro
      - ../horarios/logs:/var/log/microservices/horarios:ro
      - ../reservas/logs:/var/log/microservices/reservas:ro
      - ../pago/logs:/var/log/microservices/pago:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: observability-grafana
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

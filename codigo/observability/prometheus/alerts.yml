groups:
  - name: microservicios
    interval: 30s
    rules:
      - alert: ServicioCaido
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Servicio {{ $labels.job }} no responde"
          description: "El target {{ $labels.instance }} lleva mas de 1 minuto con up=0."

      - alert: AltaTasaErrores5xx
        expr: sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Errores 5xx elevados en {{ $labels.job }}"
          description: "Tasa de errores HTTP 5xx por encima del umbral."

      - alert: CircuitBreakerAbierto
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker abierto en {{ $labels.name }}"
          description: "El circuit breaker entro en estado OPEN."

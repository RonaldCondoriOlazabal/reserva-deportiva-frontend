global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: auth-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-ms:9081"]

  - job_name: canchas-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["canchas-ms:9082"]

  - job_name: horarios-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["horarios-ms:9083"]

  - job_name: reservas-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - reservas-ms:9084
          - reservas-ms:9184

  - job_name: pago-ms
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["pago-ms:9085"]
